openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NeuroFlow OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sessions
    description: Focus session management
  - name: behavioral
    description: Behavioral signal ingestion
  - name: predictions
    description: Cognitive state predictions
  - name: interventions
    description: Active interventions
  - name: insights
    description: AI-generated insights
  - name: profile
    description: User cognitive profile
  - name: analytics
    description: Dashboard analytics and summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List all sessions (most recent first)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Start a new focus session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/active:
    get:
      operationId: getActiveSession
      tags: [sessions]
      summary: Get the currently active session (if any)
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: No active session

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update a session (e.g., stop it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionUpdate"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}/snapshots:
    get:
      operationId: listSessionSnapshots
      tags: [behavioral]
      summary: Get behavioral snapshots for a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of behavioral snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BehavioralSnapshot"

  /behavioral/snapshot:
    post:
      operationId: submitSnapshot
      tags: [behavioral]
      summary: Submit a behavioral snapshot (typing metrics, pauses, etc.)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SnapshotInput"
      responses:
        "201":
          description: Snapshot recorded and prediction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SnapshotResult"

  /predictions/current:
    get:
      operationId: getCurrentPrediction
      tags: [predictions]
      summary: Get the latest cognitive state prediction
      responses:
        "200":
          description: Current prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prediction"
        "404":
          description: No active session

  /predictions/history:
    get:
      operationId: listPredictions
      tags: [predictions]
      summary: Get prediction history for the active or recent session
      parameters:
        - name: sessionId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: List of predictions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Prediction"

  /interventions:
    get:
      operationId: listInterventions
      tags: [interventions]
      summary: Get list of recent interventions
      parameters:
        - name: sessionId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: List of interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Intervention"

  /interventions/{id}/acknowledge:
    patch:
      operationId: acknowledgeIntervention
      tags: [interventions]
      summary: Acknowledge / dismiss an intervention
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Intervention acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Intervention"

  /insights:
    get:
      operationId: listInsights
      tags: [insights]
      summary: Get AI-generated cognitive insights
      responses:
        "200":
          description: List of insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Insight"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the user's cognitive profile
      responses:
        "200":
          description: User cognitive profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CognitiveProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user cognitive profile settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CognitiveProfile"

  /analytics/summary:
    get:
      operationId: getDashboardSummary
      tags: [analytics]
      summary: Get dashboard summary (total sessions, avg focus, top hours, etc.)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /analytics/productivity-trend:
    get:
      operationId: getProductivityTrend
      tags: [analytics]
      summary: Get productivity trend over recent sessions
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        "200":
          description: Productivity trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"

  /analytics/peak-hours:
    get:
      operationId: getPeakHours
      tags: [analytics]
      summary: Get peak focus hours breakdown
      responses:
        "200":
          description: Peak hours data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyFocusPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Session:
      type: object
      required: [id, status, startedAt, focusScore, fatigueIndex, distractionRisk]
      properties:
        id:
          type: integer
        label:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, completed, paused]
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time
        durationMinutes:
          type: ["number", "null"]
        focusScore:
          type: number
          description: 0-100 average focus score for session
        fatigueIndex:
          type: number
          description: 0-100 fatigue index
        distractionRisk:
          type: number
          description: 0-100 distraction risk
        typingWpm:
          type: ["number", "null"]
          description: Average typing speed in WPM
        pauseRate:
          type: ["number", "null"]
          description: Average pause frequency
        backspaceRate:
          type: ["number", "null"]
        snapshotCount:
          type: integer
          default: 0

    SessionInput:
      type: object
      properties:
        label:
          type: string

    SessionUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [completed, paused, active]
        label:
          type: string

    BehavioralSnapshot:
      type: object
      required: [id, sessionId, capturedAt, typingWpm, pauseCount, backspaceRate, focusScore, fatigueIndex, distractionRisk]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        capturedAt:
          type: string
          format: date-time
        typingWpm:
          type: number
        pauseCount:
          type: integer
        pauseDurationMs:
          type: number
        backspaceRate:
          type: number
        keystrokeCount:
          type: integer
        idleTimeMs:
          type: number
        focusScore:
          type: number
        fatigueIndex:
          type: number
        distractionRisk:
          type: number

    SnapshotInput:
      type: object
      required: [sessionId, typingWpm, pauseCount, backspaceRate, keystrokeCount]
      properties:
        sessionId:
          type: integer
        typingWpm:
          type: number
        pauseCount:
          type: integer
        pauseDurationMs:
          type: number
        backspaceRate:
          type: number
        keystrokeCount:
          type: integer
        idleTimeMs:
          type: number

    SnapshotResult:
      type: object
      required: [snapshot, prediction]
      properties:
        snapshot:
          $ref: "#/components/schemas/BehavioralSnapshot"
        prediction:
          $ref: "#/components/schemas/Prediction"
        intervention:
          $ref: "#/components/schemas/Intervention"

    Prediction:
      type: object
      required: [id, sessionId, predictedAt, focusScore, fatigueIndex, distractionRisk, focusTrend]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        predictedAt:
          type: string
          format: date-time
        focusScore:
          type: number
          description: Current focus score 0-100
        fatigueIndex:
          type: number
          description: Fatigue level 0-100
        distractionRisk:
          type: number
          description: Distraction risk 0-100
        focusTrend:
          type: string
          enum: [rising, stable, declining, critical]
        minutesUntilFocusDrop:
          type: ["integer", "null"]
          description: Predicted minutes until focus drop (null if stable)
        alertLevel:
          type: string
          enum: [none, low, medium, high, critical]

    Intervention:
      type: object
      required: [id, sessionId, type, message, triggeredAt, acknowledged]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        type:
          type: string
          enum: [break_suggestion, focus_mode, reduce_noise, warning, encouragement]
        message:
          type: string
        triggeredAt:
          type: string
          format: date-time
        acknowledged:
          type: boolean
        acknowledgedAt:
          type: ["string", "null"]
          format: date-time

    Insight:
      type: object
      required: [id, category, text, confidence, generatedAt]
      properties:
        id:
          type: integer
        category:
          type: string
          enum: [peak_hours, session_length, break_pattern, fatigue_pattern, focus_pattern]
        text:
          type: string
          description: Human-readable insight
        confidence:
          type: number
          description: 0-1 confidence score
        dataPoints:
          type: integer
          description: Number of data points used
        generatedAt:
          type: string
          format: date-time

    CognitiveProfile:
      type: object
      required: [id, peakFocusHourStart, peakFocusHourEnd, avgAttentionSpanMinutes, fatigueThreshold, totalSessions, totalFocusMinutes]
      properties:
        id:
          type: integer
        peakFocusHourStart:
          type: integer
          description: Hour of day (0-23)
        peakFocusHourEnd:
          type: integer
        avgAttentionSpanMinutes:
          type: number
        fatigueThreshold:
          type: number
          description: WPM drop % that indicates fatigue
        baselineWpm:
          type: ["number", "null"]
        baselinePauseRate:
          type: ["number", "null"]
        totalSessions:
          type: integer
        totalFocusMinutes:
          type: number
        updatedAt:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        peakFocusHourStart:
          type: integer
        peakFocusHourEnd:
          type: integer
        avgAttentionSpanMinutes:
          type: number
        fatigueThreshold:
          type: number

    DashboardSummary:
      type: object
      required: [totalSessions, completedSessions, totalFocusMinutes, avgFocusScore, avgFatigueIndex, avgDistractionRisk, streakDays, todaySessions, todayFocusMinutes]
      properties:
        totalSessions:
          type: integer
        completedSessions:
          type: integer
        totalFocusMinutes:
          type: number
        avgFocusScore:
          type: number
        avgFatigueIndex:
          type: number
        avgDistractionRisk:
          type: number
        streakDays:
          type: integer
        todaySessions:
          type: integer
        todayFocusMinutes:
          type: number
        bestFocusHour:
          type: ["integer", "null"]
        totalInterventions:
          type: integer

    TrendPoint:
      type: object
      required: [date, avgFocusScore, avgFatigueIndex, sessionCount, totalMinutes]
      properties:
        date:
          type: string
          format: date
        avgFocusScore:
          type: number
        avgFatigueIndex:
          type: number
        sessionCount:
          type: integer
        totalMinutes:
          type: number

    HourlyFocusPoint:
      type: object
      required: [hour, avgFocusScore, sessionCount]
      properties:
        hour:
          type: integer
          description: Hour of day 0-23
        avgFocusScore:
          type: number
        sessionCount:
          type: integer
